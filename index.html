<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Gauss Solver | CS Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #2a2a40; --accent: #6c63ff;
    --accent2: #ff6584; --accent3: #43e97b; --text: #e8e8f0; --muted: #6b6b8a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; line-height: 1.6; }
  .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
  .hero { text-align: center; margin-bottom: 40px; }
  .hero h1 { font-size: 3rem; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
  .matrix-wrapper { overflow-x: auto; padding: 10px 0; }
  .matrix-grid { display: inline-grid; gap: 8px; margin: 0 auto; }
  .matrix-row { display: flex; gap: 8px; align-items: center; }
  
  input {
    background: #1a1a26; border: 1px solid var(--border); color: #fff;
    font-family: 'Space Mono', monospace; padding: 10px; border-radius: 6px;
    width: 70px; text-align: center; transition: 0.2s;
  }
  input:focus { border-color: var(--accent); outline: none; background: #222235; }
  .b-input { background: rgba(108,99,255,0.1); border-color: var(--accent); }
  
  .btn {
    padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer;
    font-weight: 700; font-family: 'Syne'; transition: 0.3s;
  }
  .btn-primary { background: var(--accent); color: #white; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(108,99,255,0.4); }
  
  .equation-preview { font-family: 'Space Mono'; font-size: 0.9rem; color: var(--accent3); margin: 15px 0; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; }
  .step-card { border-left: 4px solid var(--accent); background: #161621; margin-bottom: 15px; padding: 15px; border-radius: 0 8px 8px 0; }
  .step-op { color: var(--accent3); font-weight: bold; margin-bottom: 10px; font-family: 'Space Mono'; }
  
  .rank-box { display: flex; gap: 20px; margin-bottom: 20px; }
  .stat { flex: 1; background: #1a1a26; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
  .stat .val { font-size: 2rem; color: var(--accent); font-weight: 800; }
  
  table { border-collapse: collapse; margin: 10px 0; }
  td { border: 1px solid var(--border); padding: 8px 12px; text-align: center; font-family: 'Space Mono'; }
  .pivot-cell { background: rgba(255, 209, 102, 0.2); color: #ffd166; }
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <h1>Gauss-Jordan Expert</h1>
    <p style="color: var(--muted)">Linear Algebra Academic Solver</p>
  </div>

  <div class="card">
    <div style="display: flex; gap: 15px; align-items: flex-end;">
      <div>
        <label style="display:block; font-size:0.8rem; margin-bottom:5px">Equations (m)</label>
        <input type="number" id="rows" value="3" min="1" max="10">
      </div>
      <div>
        <label style="display:block; font-size:0.8rem; margin-bottom:5px">Unknowns (n)</label>
        <input type="number" id="cols" value="3" min="1" max="10">
      </div>
      <button class="btn btn-primary" onclick="initMatrix()">Generate Workspace</button>
    </div>
  </div>

  <div id="workspace" class="card" style="display:none">
    <h3 style="margin-bottom:15px">02. Enter Coefficients & Constants</h3>
    <div id="equationDisplay" class="equation-preview"></div>
    <div class="matrix-wrapper">
      <div id="grid" class="matrix-grid"></div>
    </div>
    <div style="margin-top:20px; display:flex; gap:10px">
      <button class="btn btn-primary" onclick="solve()">▶ Solve Step-by-Step</button>
      <button class="btn" style="background:#2a2a40; color:white" onclick="loadExample()">Load Example</button>
    </div>
  </div>

  <div id="output"></div>
</div>

<script>
let R, C;

// Initialization & Keyboard Navigation
function initMatrix() {
    R = parseInt(document.getElementById('rows').value);
    C = parseInt(document.getElementById('cols').value);
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    
    for (let i = 0; i < R; i++) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'matrix-row';
        for (let j = 0; j <= C; j++) {
            const input = document.createElement('input');
            input.type = 'number';
            input.id = `cell-${i}-${j}`;
            input.placeholder = j === C ? `b${i+1}` : `x${j+1}`;
            if (j === C) input.classList.add('b-input');
            
            // Arrow Keys Logic
            input.onkeydown = function(e) {
                if (e.key.includes('Arrow')) {
                    e.preventDefault();
                    let ni = i, nj = j;
                    if (e.key === 'ArrowRight') nj++;
                    if (e.key === 'ArrowLeft') nj--;
                    if (e.key === 'ArrowDown') ni++;
                    if (e.key === 'ArrowUp') ni--;
                    const next = document.getElementById(`cell-${ni}-${nj}`);
                    if (next) next.focus();
                }
            };
            input.oninput = updateEquations;
            rowDiv.appendChild(input);
        }
        grid.appendChild(rowDiv);
    }
    document.getElementById('workspace').style.display = 'block';
    updateEquations();
}

function updateEquations() {
    let html = '';
    for (let i = 0; i < R; i++) {
        let line = [];
        for (let j = 0; j < C; j++) {
            let val = document.getElementById(`cell-${i}-${j}`).value || '0';
            line.push(`${val}x<sub>${j+1}</sub>`);
        }
        let b = document.getElementById(`cell-${i}-${C}`).value || '0';
        html += `Eq ${i+1}: ` + line.join(' + ') + ` = ${b}<br>`;
    }
    document.getElementById('equationDisplay').innerHTML = html.replace(/\+ -/g, '- ');
}

function loadExample() {
    const ex = [[2, 1, -1, 8], [-3, -1, 2, -11], [-2, 1, 2, -3]];
    document.getElementById('rows').value = 3;
    document.getElementById('cols').value = 3;
    initMatrix();
    for(let i=0; i<3; i++) {
        for(let j=0; j<4; j++) document.getElementById(`cell-${i}-${j}`).value = ex[i][j];
    }
    updateEquations();
}

// Math Utility: Fraction Format
function format(n) {
    if (Math.abs(n) < 1e-10) return "0";
    if (Number.isInteger(n)) return n.toString();
    for (let d = 1; d <= 50; d++) {
        let num = Math.round(n * d);
        if (Math.abs(n - num / d) < 1e-6) return d === 1 ? `${num}` : `${num}/${d}`;
    }
    return n.toFixed(2);
}

function solve() {
    let mat = [];
    for (let i = 0; i < R; i++) {
        mat[i] = [];
        for (let j = 0; j <= C; j++) {
            mat[i][j] = parseFloat(document.getElementById(`cell-${i}-${j}`).value) || 0;
        }
    }

    const output = document.getElementById('output');
    output.innerHTML = '<h2>Solution Steps:</h2>';

    let steps = "";
    let pivotRow = 0;
    let pivotCol = 0;

    while (pivotRow < R && pivotCol < C) {
        // Partial Pivoting
        let max = pivotRow;
        for (let i = pivotRow + 1; i < R; i++) {
            if (Math.abs(mat[i][pivotCol]) > Math.abs(mat[max][pivotCol])) max = i;
        }

        if (Math.abs(mat[max][pivotCol]) < 1e-10) {
            pivotCol++;
            continue;
        }

        if (max !== pivotRow) {
            [mat[pivotRow], mat[max]] = [mat[max], mat[pivotRow]];
            steps += renderStep(mat, `Swap R${pivotRow+1} ↔ R${max+1}`, pivotRow, pivotCol);
        }

        // Eliminate below
        for (let i = pivotRow + 1; i < R; i++) {
            if (Math.abs(mat[i][pivotCol]) > 1e-10) {
                let factor = mat[i][pivotCol] / mat[pivotRow][pivotCol];
                for (let j = pivotCol; j <= C; j++) mat[i][j] -= factor * mat[pivotRow][j];
                steps += renderStep(mat, `R${i+1} → R${i+1} - (${format(factor)})R${pivotRow+1}`, i, pivotCol);
            }
        }
        pivotRow++;
        pivotCol++;
    }

    // Rank Analysis
    let rankA = 0;
    let rankAug = 0;
    for (let i = 0; i < R; i++) {
        let rowEmptyA = true;
        for (let j = 0; j < C; j++) if (Math.abs(mat[i][j]) > 1e-10) rowEmptyA = false;
        if (!rowEmptyA) rankA++;
        
        let rowEmptyAug = true;
        for (let j = 0; j <= C; j++) if (Math.abs(mat[i][j]) > 1e-10) rowEmptyAug = false;
        if (!rowEmptyAug) rankAug++;
    }

    let finalLogic = "";
    if (rankA < rankAug) {
        finalLogic = `<div class="stat" style="border-color:var(--accent2)">Status: <strong>No Solution</strong> (Inconsistent)</div>`;
    } else if (rankA < C) {
        finalLogic = `<div class="stat" style="border-color:var(--accent)">Status: <strong>Infinite Solutions</strong> (${C - rankA} Free Variables)</div>`;
    } else {
        finalLogic = `<div class="stat" style="border-color:var(--accent3)">Status: <strong>Unique Solution</strong></div>`;
    }

    output.innerHTML += `
        <div class="rank-box">
            <div class="stat"><div class="lbl">Rank(A)</div><div class="val">${rankA}</div></div>
            <div class="stat"><div class="lbl">Rank(Aug)</div><div class="val">${rankAug}</div></div>
            <div class="stat"><div class="lbl">Unknowns (n)</div><div class="val">${C}</div></div>
        </div>
        ${finalLogic}
        ${steps}
    `;
    output.scrollIntoView({behavior: 'smooth'});
}

function renderStep(m, title, pr, pc) {
    let h = `<div class="step-card"><div class="step-op">${title}</div><table>`;
    for (let i = 0; i < R; i++) {
        h += `<tr>`;
        for (let j = 0; j <= C; j++) {
            let cls = (i === pr && j === pc) ? 'class="pivot-cell"' : '';
            h += `<td ${cls}>${format(m[i][j])}</td>`;
        }
        h += `</tr>`;
    }
    return h + `</table></div>`;
}

// Initial Run
window.onload = initMatrix;
</script>

</body>
</html>
