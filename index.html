<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gauss Elimination Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a40;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --pivot-color: #ffd166;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid and Orbs (Same as your design) */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .orb1 { width: 400px; height: 400px; background: rgba(108,99,255,0.12); top: -100px; right: -100px; }

  .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px; }

  /* Hero Section */
  .hero { text-align: center; padding: 60px 0 30px; }
  .hero-tag { display: inline-block; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--accent); border: 1px solid rgba(108,99,255,0.4); padding: 5px 14px; border-radius: 20px; margin-bottom: 10px; text-transform: uppercase; }
  .hero h1 { font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 800; line-height: 1.1; background: linear-gradient(135deg, #fff 0%, #a89bff 50%, #ff6584 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 14px; }

  /* Card Styles */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 24px; position: relative; }
  .card-title { font-size: 0.75rem; font-family: 'Space Mono', monospace; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
  .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Dynamic Equations Preview */
  .eqn-box { background: var(--surface2); border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--accent); font-family: 'Space Mono', monospace; font-size: 0.85rem; line-height: 1.6; }
  .eqn-line { color: var(--text); margin-bottom: 4px; }

  /* Matrix Input Grid */
  .matrix-grid { display: grid; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
  .matrix-row { display: flex; align-items: center; gap: 8px; min-width: max-content; }
  .matrix-row input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'Space Mono', monospace; padding: 10px; border-radius: 8px; width: 70px; text-align: center; outline: none; }
  .matrix-row input:focus { border-color: var(--accent); }
  .sep { color: var(--accent); font-weight: bold; margin: 0 5px; }

  /* Buttons */
  .btn { padding: 13px 28px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 700; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #9b8cff); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }

  /* Steps Output */
  .step-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; animation: fadeIn 0.5s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .step-header { padding: 12px 20px; font-family: 'Space Mono', monospace; font-size: 0.75rem; text-transform: uppercase; background: rgba(108,99,255,0.08); color: var(--accent); border-bottom: 1px solid var(--border); }
  .step-body { padding: 20px; }
  .op-text { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--pivot-color); margin-bottom: 15px; }

  .mat-table { border-collapse: collapse; font-family: 'Space Mono', monospace; font-size: 0.85rem; margin: 0 auto; }
  .mat-table td { padding: 8px 14px; text-align: center; border: 1px solid var(--border); color: var(--text); min-width: 60px; }
  .highlight-pivot { background: rgba(255,209,102,0.15); color: var(--pivot-color) !important; font-weight: bold; }
  .highlight-zero { background: rgba(67,233,123,0.05); color: var(--muted); }

  /* Analysis Box */
  .stat-grid { display: flex; gap: 15px; margin-top: 20px; }
  .stat-card { flex: 1; background: var(--surface2); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
  .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--accent3); }
  .stat-lbl { font-size: 0.65rem; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; }
</style>
</head>
<body>
<div class="orb orb1"></div>

<div class="container">
  <div class="hero">
    <div class="hero-tag">Linear Algebra Solver</div>
    <h1>Gauss Elimination</h1>
  </div>

  <div class="card">
    <div class="card-title">01 — Configure System</div>
    <div style="display:flex; gap:15px; flex-wrap:wrap; align-items:flex-end;">
      <div style="flex:1">
        <label style="font-size:0.7rem; color:var(--muted); display:block; margin-bottom:5px;">Equations (m)</label>
        <input type="number" id="numEq" value="3" min="1" max="6" style="width:100%; background:var(--surface2); border:1px solid var(--border); color:#fff; padding:10px; border-radius:8px;">
      </div>
      <div style="flex:1">
        <label style="font-size:0.7rem; color:var(--muted); display:block; margin-bottom:5px;">Variables (n)</label>
        <input type="number" id="numVar" value="3" min="1" max="6" style="width:100%; background:var(--surface2); border:1px solid var(--border); color:#fff; padding:10px; border-radius:8px;">
      </div>
      <button class="btn btn-secondary" onclick="buildMatrix()">Build Grid</button>
    </div>
  </div>

  <div class="card" id="inputCard">
    <div class="card-title">02 — Current Equations</div>
    <div id="equationsPreview" class="eqn-box"></div>
    
    <div class="card-title">03 — Matrix Coefficients [A|b]</div>
    <div id="matrixGrid" class="matrix-grid"></div>
    
    <button class="btn btn-primary" style="width:100%" onclick="solve()">Start Step-by-Step Elimination</button>
  </div>

  <div id="output"></div>
</div>

<script>
let M_rows = 3, M_cols = 3;

function buildMatrix() {
  M_rows = parseInt(document.getElementById('numEq').value);
  M_cols = parseInt(document.getElementById('numVar').value);
  const grid = document.getElementById('matrixGrid');
  grid.innerHTML = '';
  
  for (let i = 0; i < M_rows; i++) {
    const row = document.createElement('div');
    row.className = 'matrix-row';
    for (let j = 0; j < M_cols; j++) {
      const inp = document.createElement('input');
      inp.id = `m_${i}_${j}`;
      inp.placeholder = `x${j+1}`;
      inp.oninput = updatePreview;
      row.appendChild(inp);
    }
    const sep = document.createElement('span'); sep.className = 'sep'; sep.textContent = '|'; row.appendChild(sep);
    const bInp = document.createElement('input');
    bInp.id = `b_${i}`;
    bInp.placeholder = `b${i+1}`;
    bInp.oninput = updatePreview;
    row.appendChild(bInp);
    grid.appendChild(row);
  }
  updatePreview();
}

function updatePreview() {
  let html = '';
  for (let i = 0; i < M_rows; i++) {
    let eq = `Eq ${i+1}: `;
    for (let j = 0; j < M_cols; j++) {
      let val = document.getElementById(`m_${i}_${j}`).value || '0';
      eq += `${val}(x${j+1}) ${j < M_cols - 1 ? '+ ' : ''}`;
    }
    eq += ` = ${document.getElementById(`b_${i}`).value || '0'}`;
    html += `<div class="eqn-line">${eq}</div>`;
  }
  document.getElementById('equationsPreview').innerHTML = html;
}

function renderMatrixHTML(mat, hRow = -1, hCol = -1) {
  let html = '<table class="mat-table">';
  mat.forEach((row, i) => {
    html += '<tr>';
    row.forEach((cell, j) => {
      let cls = (i === hRow && j === hCol) ? 'highlight-pivot' : (Math.abs(cell) < 1e-9 ? 'highlight-zero' : '');
      let val = Math.abs(cell) < 1e-9 ? 0 : Number.isInteger(cell) ? cell : cell.toFixed(2);
      html += `<td class="${cls}">${val}</td>`;
    });
    html += '</tr>';
  });
  return html + '</table>';
}

function addStep(title, opText, mat, hR, hC) {
  const out = document.getElementById('output');
  const card = document.createElement('div');
  card.className = 'step-card';
  card.innerHTML = `
    <div class="step-header">${title}</div>
    <div class="step-body">
      ${opText ? `<div class="op-text">${opText}</div>` : ''}
      ${renderMatrixHTML(mat, hR, hC)}
    </div>`;
  out.appendChild(card);
}

function solve() {
  const out = document.getElementById('output');
  out.innerHTML = '<div class="card-title">Elimination Steps</div>';
  
  let M = [];
  for (let i = 0; i < M_rows; i++) {
    let row = [];
    for (let j = 0; j < M_cols; j++) row.push(parseFloat(document.getElementById(`m_${i}_${j}`).value) || 0);
    row.push(parseFloat(document.getElementById(`b_${i}`).value) || 0);
    M.push(row);
  }

  let pivotRow = 0;
  let pivotCol = 0;

  while (pivotRow < M_rows && pivotCol < M_cols) {
    // Partial Pivoting
    let max = Math.abs(M[pivotRow][pivotCol]);
    let maxR = pivotRow;
    for (let k = pivotRow + 1; k < M_rows; k++) {
      if (Math.abs(M[k][pivotCol]) > max) {
        max = Math.abs(M[k][pivotCol]);
        maxR = k;
      }
    }

    if (max < 1e-9) {
      pivotCol++;
      continue;
    }

    if (maxR !== pivotRow) {
      [M[pivotRow], M[maxR]] = [M[maxR], M[pivotRow]];
      addStep("Row Swap", `Swapping R${pivotRow+1} with R${maxR+1} to get a better pivot.`, M);
    }

    // Normalize Pivot to 1
    let div = M[pivotRow][pivotCol];
    if (Math.abs(div - 1) > 1e-9) {
      for (let j = pivotCol; j <= M_cols; j++) M[pivotRow][j] /= div;
      addStep("Normalization", `Divide R${pivotRow+1} by ${div.toFixed(2)} to make pivot = 1.`, M, pivotRow, pivotCol);
    }

    // Eliminate below "element by element"
    for (let i = pivotRow + 1; i < M_rows; i++) {
      let factor = M[i][pivotCol];
      if (Math.abs(factor) > 1e-9) {
        for (let j = pivotCol; j <= M_cols; j++) {
          M[i][j] -= factor * M[pivotRow][j];
        }
        addStep("Elimination", `R${i+1} = R${i+1} - (${factor.toFixed(2)}) * R${pivotRow+1}`, M, i, pivotCol);
      }
    }
    pivotRow++;
    pivotCol++;
  }

  calculateRank(M);
}

function calculateRank(M) {
  let r = 0;
  let rAug = 0;
  let n = M_cols;

  for (let i = 0; i < M_rows; i++) {
    let rowAZero = true;
    for (let j = 0; j < M_cols; j++) if (Math.abs(M[i][j]) > 1e-9) rowAZero = false;
    if (!rowAZero) r++;

    let rowAugZero = rowAZero && Math.abs(M[i][M_cols]) < 1e-9;
    if (!rowAZero || Math.abs(M[i][M_cols]) > 1e-9) rAug++;
  }

  const out = document.getElementById('output');
  let type = "";
  let color = "var(--accent3)";

  if (r < rAug) {
    type = "No Solution (Inconsistent)";
    color = "var(--accent2)";
  } else if (r === n) {
    type = "Unique Solution";
  } else {
    type = "Infinite Solutions";
    color = "var(--pivot-color)";
  }

  let finalBox = `
    <div class="card">
      <div class="card-title">Final Analysis</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-val">${r}</div><div class="stat-lbl">Rank (r)</div></div>
        <div class="stat-card"><div class="stat-val">${n}</div><div class="stat-lbl">Variables (n)</div></div>
        <div class="stat-card"><div class="stat-val" style="color:${color}">${type}</div><div class="stat-lbl">System Status</div></div>
      </div>
  `;

  if (r === n && r === rAug) {
    // Simple Back Substitution for Unique Solution
    let sol = new Array(n).fill(0);
    for (let i = n - 1; i >= 0; i--) {
      let sum = M[i][n];
      for (let j = i + 1; j < n; j++) sum -= M[i][j] * sol[j];
      sol[i] = sum / M[i][i];
    }
    finalBox += `<div style="margin-top:20px; font-family:'Space Mono'">`;
    sol.forEach((s, idx) => {
      finalBox += `<div style="padding:10px; border-bottom:1px solid var(--border)">x${idx+1} = <b style="color:var(--accent3)">${s.toFixed(2)}</b></div>`;
    });
    finalBox += `</div>`;
  } else if (r < n && r === rAug) {
    finalBox += `<div style="margin-top:20px; color:var(--pivot-color); font-family:'Space Mono'">
      Number of free parameters = n - r = ${n - r}
    </div>`;
  }

  finalBox += `</div>`;
  out.innerHTML += finalBox;
}

// Initialize
window.onload = buildMatrix;
</script>
</body>
</html>
