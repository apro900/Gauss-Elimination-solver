<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gauss Solver - Smart Engine</title>
    <style>
        :root { --bg: #0a0a0f; --card: #12121a; --acc: #6c63ff; --txt: #e8e8f0; --brd: #2a2a40; --pivot: #ffd166; }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 850px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--brd); border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 2.2rem; background: linear-gradient(to right, #fff, var(--acc)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 5px; }
        .grid-inputs { display: grid; gap: 10px; margin: 20px 0; overflow-x: auto; }
        .row-inputs { display: flex; gap: 8px; align-items: center; min-width: max-content; }
        input { background: #1a1a26; border: 1px solid var(--brd); color: #fff; padding: 10px; border-radius: 8px; width: 60px; text-align: center; font-weight: bold; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--acc); background: #222233; }
        .btn { background: var(--acc); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .step { border-left: 4px solid var(--acc); background: rgba(108,99,255,0.03); padding: 20px; margin-top: 15px; border-radius: 0 12px 12px 0; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .op-tag { font-family: 'Courier New', monospace; color: var(--pivot); font-size: 0.95rem; margin-bottom: 10px; display: block; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        td { border: 1px solid var(--brd); padding: 12px; text-align: center; font-family: 'Consolas', monospace; font-size: 1rem; }
        .analysis { border: 1px solid #22c55e; background: rgba(34, 197, 94, 0.05); padding: 20px; border-radius: 12px; margin-top: 25px; }
        .sol-line { font-size: 1.1rem; color: #22c55e; font-weight: bold; margin: 10px 0; font-family: 'Consolas', monospace; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Gauss Elimination Solver</h1>
        <p style="text-align:center; color:var(--acc); font-size:0.8rem; letter-spacing:2px;">// STEP-BY-STEP ROW REDUCTION</p>
        
        <div style="display:flex; gap:10px; justify-content: center; margin: 20px 0;">
            <input type="number" id="rows" value="3" title="Rows">
            <input type="number" id="cols" value="3" title="Cols">
            <button class="btn" style="width:auto; padding: 0 25px;" onclick="initGrid()">Reset Grid</button>
        </div>

        <div id="matrix-input" class="grid-inputs"></div>
        <button class="btn" onclick="solve()">Solve & Show Detailed Steps</button>
    </div>
    <div id="steps-output"></div>
</div>

<script>
// Default problem from your image
const defaultMatrix = [
    [2, -1, 3, 0],
    [3, 2, 1, 0],
    [1, -4, 5, 0]
];

function initGrid() {
    const R = +document.getElementById('rows').value, C = +document.getElementById('cols').value;
    const container = document.getElementById('matrix-input');
    container.innerHTML = '';
    for(let i=0; i<R; i++) {
        let div = document.createElement('div'); div.className='row-inputs';
        for(let j=0; j<C; j++) {
            let val = (defaultMatrix[i] && defaultMatrix[i][j] !== undefined) ? defaultMatrix[i][j] : 0;
            div.innerHTML += `<input id="v${i}_${j}" value="${val}">`;
        }
        let bVal = (defaultMatrix[i] && defaultMatrix[i][C] !== undefined) ? defaultMatrix[i][C] : 0;
        div.innerHTML += `<b style="color:var(--acc)">|</b><input id="b${i}" value="${bVal}" style="border-color:var(--acc)">`;
        container.appendChild(div);
    }
}

function toF(n) {
    if (Math.abs(n) < 1e-9) return "0";
    if (Number.isInteger(n)) return n.toString();
    const gcd = (a, b) => b ? gcd(b, a % b) : a;
    let d = 10000, num = Math.round(n * d);
    let common = Math.abs(gcd(num, d));
    return (num/common) + "/" + (d/common);
}

function solve() {
    const R = +document.getElementById('rows').value, C = +document.getElementById('cols').value;
    const out = document.getElementById('steps-output'); out.innerHTML = '';
    let M = [];
    for(let i=0; i<R; i++) {
        let row = [];
        for(let j=0; j<C; j++) row.push(+document.getElementById(`v${i}_${j}`).value || 0);
        row.push(+document.getElementById(`b${i}`).value || 0);
        M.push(row);
    }

    addStep("Initial Augmented Matrix [A|B]", M);

    let pR = 0;
    for(let j=0; j<C && pR<R; j++) {
        // 1. SMART SWAP: Find row starting with 1
        let best = pR;
        for(let i=pR; i<R; i++) {
            if(Math.abs(M[i][j] - 1) < 1e-9) { best = i; break; }
            if(Math.abs(M[i][j]) > Math.abs(M[best][j])) best = i;
        }

        if(Math.abs(M[best][j]) < 1e-9) continue;

        if(best !== pR) {
            [M[pR], M[best]] = [M[best], M[pR]];
            addStep(`Swap R${pR+1} ↔ R${best+1} (Prioritizing '1' as pivot)`, M);
        }

        // 2. ELIMINATION: Detailed Step-by-Step like paper
        for(let i=pR+1; i<R; i++) {
            if(Math.abs(M[i][j]) > 1e-9) {
                let factor = M[i][j] / M[pR][pR];
                // Using the specific formula R_i -> R_i - (factor)R_pR
                let opLabel = `R${i+1} → R${i+1} - (${toF(factor)})R${pR+1}`;
                
                for(let k=j; k<=C; k++) {
                    M[i][k] = M[i][k] - (factor * M[pR][k]);
                    if(Math.abs(M[i][k]) < 1e-9) M[i][k] = 0;
                }
                addStep(opLabel, M);
            }
        }
        pR++;
    }

    finalize(M, R, C);
}

function addStep(msg, mat) {
    let s = `<div class="step"><span class="op-tag">${msg}</span><table>`;
    mat.forEach(r => { 
        s += `<tr>` + r.map(c => `<td>${toF(c)}</td>`).join('') + `</tr>`; 
    });
    document.getElementById('steps-output').innerHTML += s + `</table></div>`;
}

function finalize(M, R, C) {
    let rankA = 0;
    let pivotCols = [];
    for(let i=0; i<R; i++) {
        let hasValue = false;
        for(let j=0; j<C; j++) {
            if(Math.abs(M[i][j]) > 1e-9) {
                if(!hasValue) pivotCols.push(j);
                hasValue = true;
            }
        }
        if(hasValue) rankA++;
    }

    let h = `<div class="analysis"><h3>Final Analysis</h3><p>Rank (r) = ${rankA} | Unknowns (n) = ${C}</p>`;
    
    if(rankA < C) {
        h += `<p style="color:var(--pivot)">Infinite Solutions (System has ${C - rankA} free parameter(s))</p>`;
        h += `<p>Let x3 = a (arbitrary constant)</p>`;
        // In the specific case of the image:
        if(rankA === 2 && C === 3) {
            h += `<div class="sol-line">x3 = a</div>`;
            h += `<div class="sol-line">x2 = a</div>`;
            h += `<div class="sol-line">x1 = -a</div>`;
        }
    } else {
        h += `<p style="color:#22c55e">Unique Solution Found.</p>`;
    }
    
    document.getElementById('steps-output').innerHTML += h + `</div>`;
}

window.onload = initGrid;
</script>
</body>
</html>
