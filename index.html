<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gauss Elimination Solver</title>
<style>
/* ── نفس الـ CSS بتاعك بدون تغيير سطر واحد للحفاظ على الديزاين ── */
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
  --border: #2a2a40; --accent: #6c63ff; --accent2: #ff6584;
  --accent3: #43e97b; --text: #e8e8f0; --muted: #6b6b8a;
  --yellow: #ffd166; --teal: #06d6a0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Courier New',monospace; min-height:100vh; }
body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(108,99,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(108,99,255,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
.orb { position:fixed; border-radius:50%; filter:blur(120px); pointer-events:none; z-index:0; }
.orb1 { width:500px; height:500px; background:rgba(108,99,255,0.1); top:-150px; right:-150px; }
.orb2 { width:400px; height:400px; background:rgba(255,101,132,0.07); bottom:0; left:-100px; }
.wrap { position:relative; z-index:1; max-width:950px; margin:0 auto; padding:40px 20px 80px; }
.hero { text-align:center; padding:50px 0 40px; }
.hero-badge { display:inline-block; font-size:10px; letter-spacing:3px; color:var(--accent); border:1px solid rgba(108,99,255,0.4); padding:5px 16px; border-radius:20px; margin-bottom:20px; text-transform:uppercase; }
.hero h1 { font-size:clamp(2rem,5vw,3.5rem); font-weight:900; letter-spacing:-1px; background:linear-gradient(135deg,#fff 0%,#a89bff 50%,#ff6584 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:10px; }
.hero p { color:var(--muted); font-size:0.85rem; letter-spacing:2px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px; margin-bottom:20px; position:relative; overflow:hidden; }
.card-label { font-size:10px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
.card-label::after { content:''; flex:1; height:1px; background:var(--border); }
.setup-row { display:flex; gap:16px; align-items:flex-end; flex-wrap:wrap; }
.field { display:flex; flex-direction:column; gap:6px; flex:1; min-width:100px; }
.field label { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
.field input[type=number] { background:var(--surface2); border:1px solid var(--border); color:var(--text); font-family:'Courier New',monospace; font-size:1.1rem; padding:11px 14px; border-radius:10px; outline:none; }
.mrow { display:flex; align-items:center; gap:8px; margin-bottom:8px; min-width:max-content; }
.row-lbl { width:36px; text-align:right; font-size:11px; color:var(--muted); flex-shrink:0; }
.cell { background:var(--surface2); border:1px solid var(--border); color:var(--text); font-family:'Courier New',monospace; width:70px; padding:10px; border-radius:8px; text-align:center; outline:none; }
.aug-sep { width:2px; height:36px; background:rgba(108,99,255,0.4); margin:0 4px; }
.btn { padding:13px 24px; border-radius:10px; border:none; cursor:pointer; font-family:'Courier New',monospace; font-weight:700; font-size:0.9rem; transition:all .2s; }
.btn-solve { background:linear-gradient(135deg,var(--accent),#9b8cff); color:#fff; width:100%; margin-top:15px; }
.btn-solve:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(108,99,255,0.4); }
.step { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:14px; padding:18px; }
.step-head { font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; color:var(--accent); }
.op-box { font-size:0.9rem; color:var(--text); padding:10px 14px; background:rgba(255,255,255,0.03); border-left:3px solid var(--accent); border-radius:0 8px 8px 0; margin-bottom:14px; }
.mat { border-collapse:collapse; margin:0 auto; font-family:'Courier New',monospace; font-size:0.88rem; }
.mat td { padding:9px 16px; text-align:center; border:1px solid var(--border); min-width:60px; color:var(--text); }
.mat td.bc { border-left:2px solid rgba(108,99,255,0.5); color:var(--accent); }
.analysis { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:14px; padding:20px; }
.rank-bars { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
.rb { flex:1; min-width:80px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center; }
.rb .v { font-size:2rem; font-weight:900; }
.rb .l { font-size:9px; color:var(--muted); text-transform:uppercase; }
.sol-line { font-size:1rem; color:var(--accent3); padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrap">
  <div class="hero">
    <div class="hero-badge">Linear Algebra</div>
    <h1>Gauss Elimination</h1>
    <p>// Academic Step-by-Step Solver</p>
  </div>

  <div class="card">
    <div class="card-label">01 — System Size</div>
    <div class="setup-row">
      <div class="field"><label>Equations (m)</label><input type="number" id="numM" value="3" min="1"></div>
      <div class="field"><label>Unknowns (n)</label><input type="number" id="numN" value="3" min="1"></div>
      <button class="btn" style="background:var(--surface2); color:var(--text); border:1px solid var(--border)" onclick="buildGrid()">Build →</button>
    </div>
  </div>

  <div class="card" id="matCard" style="display:none">
    <div class="card-label">02 — Augmented Matrix [A | b]</div>
    <div id="matGrid" style="overflow-x:auto"></div>
    <button class="btn btn-solve" onclick="solve()">▶ Solve System</button>
  </div>

  <div id="output"></div>
</div>

<script>
const EPS = 1e-9;
const fmt = v => Math.abs(v) < EPS ? "0" : (Number.isInteger(v) ? v : v.toFixed(2));

function buildGrid() {
  const M = +document.getElementById('numM').value, N = +document.getElementById('numN').value;
  const g = document.getElementById('matGrid'); g.innerHTML = '';
  for(let i=0; i<M; i++) {
    let row = `<div class="mrow"><span class="row-lbl">R${i+1}</span>`;
    for(let j=0; j<N; j++) row += `<input type="number" class="cell" id="a_${i}_${j}" placeholder="x${j+1}">`;
    row += `<div class="aug-sep"></div><input type="number" class="cell" id="b_${i}" style="border-color:var(--accent3)" placeholder="b"></div>`;
    g.innerHTML += row;
  }
  document.getElementById('matCard').style.display='block';
}

function solve() {
  const M = +document.getElementById('numM').value, N = +document.getElementById('numN').value;
  let A = [];
  for(let i=0; i<M; i++) {
    let r = [];
    for(let j=0; j<N; j++) r.push(+document.getElementById(`a_${i}_${j}`).value || 0);
    r.push(+document.getElementById(`b_${i}`).value || 0);
    A.push(r);
  }

  const out = document.getElementById('output'); out.innerHTML = '';

  // 1. عرض المعادلات (Equations Representation)
  let eqStr = A.map((row, i) => {
    let parts = row.slice(0, N).map((v, j) => `${fmt(v)}x<sub>${j+1}</sub>`).join(' + ');
    return `<div style="margin-bottom:5px">${parts.replace(/\+ -/g, '- ')} = ${fmt(row[N])}</div>`;
  }).join('');
  out.innerHTML += `<div class="step"><div class="step-head">Input Equations System</div>${eqStr}</div>`;

  // 2. طريقة حل الدكاترة (Gauss Elimination with Normalization)
  let r = 0;
  for(let c=0; c<N && r<M; c++) {
    // Partial Pivoting (البحث عن أكبر عنصر لضمان الدقة)
    let pivot = r;
    for(let i=r+1; i<M; i++) if(Math.abs(A[i][c]) > Math.abs(A[pivot][c])) pivot = i;
    
    if(Math.abs(A[pivot][c]) < EPS) continue;

    if(pivot !== r) {
      [A[r], A[pivot]] = [A[pivot], A[r]];
      out.innerHTML += `<div class="step"><div class="step-head">Row Swap</div><div class="op-box">R${r+1} ↔ R${pivot+1} (To get better pivot)</div></div>`;
    }

    // Normalization (الخطوة الأهم عند الدكاترة: جعل الـ Pivot = 1)
    let div = A[r][c];
    if(Math.abs(div - 1) > EPS) {
      for(let j=c; j<=N; j++) A[r][j] /= div;
      out.innerHTML += `<div class="step"><div class="step-head">Pivot Normalization (R${r+1})</div><div class="op-box">R${r+1} = R${r+1} / ${fmt(div)}</div></div>`;
    }

    // Elimination Below (تصفير ما تحت القطر الرئيسي)
    let elimOps = [];
    for(let i=r+1; i<M; i++) {
      let f = A[i][c];
      if(Math.abs(f) < EPS) continue;
      elimOps.push(`R${i+1} = R${i+1} - (${fmt(f)})R${r+1}`);
      for(let j=c; j<=N; j++) A[i][j] -= f * A[r][j];
    }
    
    if(elimOps.length > 0) {
      let table = `<table class="mat">` + A.map(row => `<tr>${row.map((v,idx)=>`<td class="${idx===N?'bc':''}">${fmt(v)}</td>`).join('')}</tr>`).join('') + `</table>`;
      out.innerHTML += `<div class="step"><div class="step-head">Elimination (Column ${c+1})</div><div class="op-box">${elimOps.join('<br>')}</div>${table}</div>`;
    }
    r++;
  }

  // 3. تحليل الرتبة والحلول (Rank Analysis)
  let rankA = 0, rankAug = 0;
  for(let i=0; i<M; i++) {
    let rowEmpty = A[i].slice(0, N).every(v => Math.abs(v) < EPS);
    let augEmpty = Math.abs(A[i][N]) < EPS;
    if(!rowEmpty) rankA++;
    if(!rowEmpty || !augEmpty) rankAug++;
  }

  let resultSection = document.createElement('div'); resultSection.className = 'analysis';
  let statusHTML = "";

  if(rankA < rankAug) {
    statusHTML = `<h2 style="color:var(--accent2)">No Solution (Inconsistent)</h2><p>Rank(A) ≠ Rank(A|b)</p>`;
  } else if(rankA < N) {
    let freeVars = N - rankA;
    statusHTML = `<h2 style="color:var(--yellow)">Infinite Solutions</h2><p>Number of free parameters: ${freeVars}</p>`;
  } else {
    // Unique Solution with Back Substitution
    statusHTML = `<h2 style="color:var(--accent3)">Unique Solution Found</h2>`;
    let sol = new Array(N).fill(0);
    let steps = [];
    for(let i=N-1; i>=0; i--) {
      let sum = A[i][N];
      for(let j=i+1; j<N; j++) sum -= A[i][j] * sol[j];
      sol[i] = sum; // لأن المعامل أصلاً أصبح 1 بسبب الـ Normalization
      steps.push(`<div class="sol-line">x<sub>${i+1}</sub> = ${fmt(sol[i])}</div>`);
    }
    statusHTML += `<div style="margin-top:15px">${steps.reverse().join('')}</div>`;
  }

  resultSection.innerHTML = `
    <div class="rank-bars">
      <div class="rb"><div class="v">${rankA}</div><div class="l">Rank(A)</div></div>
      <div class="rb"><div class="v">${rankAug}</div><div class="l">Rank(A|b)</div></div>
      <div class="rb"><div class="v">${N}</div><div class="l">n (Vars)</div></div>
    </div>
    ${statusHTML}`;
  
  out.appendChild(resultSection);
  resultSection.scrollIntoView({behavior:'smooth'});
}

window.onload = buildGrid;
</script>
</body>
</html>
