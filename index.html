<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gauss Elimination Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  /* نفس الستايبل القديم مع تحسينات طفيفة للاتجاه العربي */
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: #2a2a40; --accent: #6c63ff; --accent2: #ff6584;
    --accent3: #43e97b; --text: #e8e8f0; --muted: #6b6b8a;
    --pivot-color: #ffd166;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Syne', sans-serif; min-height: 100vh;
    direction: rtl; text-align: right;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; z-index: 1; position: relative; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 24px; }
  .matrix-grid { display: grid; gap: 10px; margin-top: 15px; direction: ltr; }
  .matrix-row { display: flex; align-items: center; gap: 8px; }
  .matrix-row input {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Space Mono', monospace;
    padding: 10px; border-radius: 8px; width: 60px; text-align: center;
  }
  .eqn-display { font-family: 'Space Mono', monospace; font-size: 0.9rem; color: var(--accent); margin-bottom: 15px; padding: 10px; background: rgba(108,99,255,0.05); border-radius: 8px; }
  .step-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; padding: 20px; }
  .step-header { font-family: 'Space Mono', monospace; font-size: 0.8rem; margin-bottom: 12px; color: var(--pivot-color); }
  .mat-table { border-collapse: collapse; margin: 10px auto; direction: ltr; }
  .mat-table td { border: 1px solid var(--border); padding: 8px 12px; text-align: center; font-family: 'Space Mono', monospace; }
  .highlight { background: rgba(108,99,255,0.2); }
  .btn { padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; }
  .btn-primary { background: var(--accent); color: white; }
  .result-box { background: var(--surface2); border: 1px solid var(--accent3); padding: 20px; border-radius: 12px; margin-top: 20px; }
  .free-var { color: var(--accent2); }
</style>
</head>
<body>

<div class="container">
  <div style="text-align:center; margin-bottom: 40px;">
    <h1 style="font-size: 2.5rem; color: #fff;">حل المعادلات بطريقة جاووس</h1>
    <p style="color: var(--muted);">تحليل كامل للرتبة (Rank) والخطوات عنصر بعنصر</p>
  </div>

  <div class="card">
    <div style="display:flex; gap:20px; margin-bottom:20px;">
      <div><label>عدد المعادلات: </label><input type="number" id="numEq" value="3" min="1" max="6" style="width:50px"></div>
      <div><label>عدد المجاهيل: </label><input type="number" id="numVar" value="3" min="1" max="6" style="width:50px"></div>
      <button class="btn btn-primary" onclick="buildMatrix()">تحديث الجدول</button>
    </div>
    
    <div id="equationsPreview" class="eqn-display"></div>
    <div id="matrixGrid" class="matrix-grid"></div>
    
    <div style="margin-top:20px;">
      <button class="btn btn-primary" onclick="solveGauss()">ابدأ الحل التدريجي</button>
    </div>
  </div>

  <div id="output"></div>
</div>

<script>
let M_rows = 3, M_cols = 3;

function buildMatrix() {
  M_rows = parseInt(document.getElementById('numEq').value);
  M_cols = parseInt(document.getElementById('numVar').value);
  const grid = document.getElementById('matrixGrid');
  grid.innerHTML = '';
  
  for (let i = 0; i < M_rows; i++) {
    const row = document.createElement('div');
    row.className = 'matrix-row';
    for (let j = 0; j < M_cols; j++) {
      const inp = document.createElement('input');
      inp.id = `m_${i}_${j}`;
      inp.placeholder = `a${i+1}${j+1}`;
      inp.oninput = updateEqPreview;
      row.appendChild(inp);
    }
    const sep = document.createElement('span'); sep.textContent = '|'; row.appendChild(sep);
    const bInp = document.createElement('input');
    bInp.id = `b_${i}`;
    bInp.style.borderColor = 'var(--accent)';
    bInp.oninput = updateEqPreview;
    row.appendChild(bInp);
    grid.appendChild(row);
  }
  updateEqPreview();
}

function updateEqPreview() {
  let html = '';
  for (let i = 0; i < M_rows; i++) {
    let eq = `R${i+1}: `;
    for (let j = 0; j < M_cols; j++) {
      let val = document.getElementById(`m_${i}_${j}`).value || '0';
      eq += `${val}x${j+1} ${j < M_cols-1 ? '+ ' : ''}`;
    }
    eq += ` = ${document.getElementById(`b_${i}`).value || '0'}`;
    html += `<div>${eq}</div>`;
  }
  document.getElementById('equationsPreview').innerHTML = html;
}

function getMatrix() {
  let mat = [];
  for (let i = 0; i < M_rows; i++) {
    let row = [];
    for (let j = 0; j < M_cols; j++) row.push(parseFloat(document.getElementById(`m_${i}_${j}`).value) || 0);
    row.push(parseFloat(document.getElementById(`b_${i}`).value) || 0);
    mat.push(row);
  }
  return mat;
}

function renderMatrix(mat, highlightRow = -1, highlightCol = -1) {
  let html = '<table class="mat-table">';
  mat.forEach((row, i) => {
    html += '<tr>';
    row.forEach((cell, j) => {
      let cls = (i === highlightRow && j === highlightCol) ? 'class="highlight"' : '';
      html += `<td ${cls}>${Number.isInteger(cell) ? cell : cell.toFixed(2)}</td>`;
    });
    html += '</tr>';
  });
  return html + '</table>';
}

function solveGauss() {
  let M = getMatrix();
  const out = document.getElementById('output');
  out.innerHTML = '<h2>خطوات الحل:</h2>';
  
  let steps = 0;
  let pivotRow = 0;
  let pivotCol = 0;

  while (pivotRow < M_rows && pivotCol < M_cols) {
    // 1. البحث عن Pivot
    let max = Math.abs(M[pivotRow][pivotCol]);
    let maxRow = pivotRow;
    for (let i = pivotRow + 1; i < M_rows; i++) {
      if (Math.abs(M[i][pivotCol]) > max) {
        max = Math.abs(M[i][pivotCol]);
        maxRow = i;
      }
    }

    if (max < 1e-9) {
      pivotCol++;
      continue;
    }

    // تبديل الصفوف إذا لزم الأمر
    if (maxRow !== pivotRow) {
      [M[pivotRow], M[maxRow]] = [M[maxRow], M[pivotRow]];
      out.innerHTML += `<div class="step-card"><div class="step-header">تبديل الصف R${pivotRow+1} مع R${maxRow+1}</div>${renderMatrix(M)}</div>`;
    }

    // 2. توحيد القطر الرئيسي (Normalize Pivot to 1)
    let div = M[pivotRow][pivotCol];
    if (div !== 1) {
      for (let j = pivotCol; j <= M_cols; j++) M[pivotRow][j] /= div;
      out.innerHTML += `<div class="step-card"><div class="step-header">جعل القطر الرئيسي = 1 (قسمة R${pivotRow+1} على ${div.toFixed(2)})</div>${renderMatrix(M, pivotRow, pivotCol)}</div>`;
    }

    // 3. تصفير ما تحت القطر "عنصر بعنصر"
    for (let i = pivotRow + 1; i < M_rows; i++) {
      let factor = M[i][pivotCol];
      if (Math.abs(factor) > 1e-9) {
        for (let j = pivotCol; j <= M_cols; j++) {
          M[i][j] -= factor * M[pivotRow][j];
        }
        out.innerHTML += `<div class="step-card"><div class="step-header">تصفير العنصر تحت القطر في الصف R${i+1}</div>
        <p>R${i+1} = R${i+1} - (${factor.toFixed(2)}) * R${pivotRow+1}</p>${renderMatrix(M, i, pivotCol)}</div>`;
      }
    }
    pivotRow++;
    pivotCol++;
  }

  analyzeSolution(M);
}

function analyzeSolution(M) {
  let rankA = 0;
  let rankAug = 0;
  let n = M_cols;

  for (let i = 0; i < M_rows; i++) {
    let rowAEmpty = true;
    for (let j = 0; j < M_cols; j++) if (Math.abs(M[i][j]) > 1e-9) rowAEmpty = false;
    if (!rowAEmpty) rankA++;
    
    let rowAugEmpty = rowAEmpty && Math.abs(M[i][M_cols]) < 1e-9;
    if (!rowAEmpty || Math.abs(M[i][M_cols]) > 1e-9) rankAug++;
  }

  let resHTML = `<div class="result-box"><h3>التحليل النهائي للرتبة:</h3>
    <p>رتبة المصفوفة الأساسية (r) = <b>${rankA}</b></p>
    <p>رتبة المصفوفة الموسعة = <b>${rankAug}</b></p>
    <p>عدد المجاهيل (n) = <b>${n}</b></p>`;

  if (rankA < rankAug) {
    resHTML += `<h4 style="color:var(--accent2)">النتيجة: r < Rank(Aug) -> لا يوجد حل (System Inconsistent)</h4>`;
  } else if (rankA === n) {
    resHTML += `<h4 style="color:var(--accent3)">النتيجة: r = n -> يوجد حل وحيد (Unique Solution)</h4>`;
    // Back substitution (Simple)
    let solutions = new Array(n).fill(0);
    for (let i = n - 1; i >= 0; i--) {
      let sum = M[i][n];
      for (let j = i + 1; j < n; j++) sum -= M[i][j] * solutions[j];
      solutions[i] = sum / M[i][i];
    }
    resHTML += `<div style="margin-top:10px">` + solutions.map((s, idx) => `<div>x${idx+1} = <b>${s.toFixed(2)}</b></div>`).join('') + `</div>`;
  } else {
    resHTML += `<h4 style="color:var(--pivot-color)">النتيجة: r < n -> عدد لا نهائي من الحلول (Infinite Solutions)</h4>`;
    resHTML += `<p>عدد الثوابت الاختيارية (Free Variables) = n - r = <b>${n - rankA}</b></p>`;
  }

  document.getElementById('output').innerHTML += resHTML + `</div>`;
}

// البدء عند تحميل الصفحة
window.onload = buildMatrix;
</script>

</body>
</html>
