<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gauss Solver — Fast Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #2a2a40;
    --accent: #6c63ff; --accent3: #43e97b; --text: #e8e8f0; --muted: #6b6b8a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; padding: 25px; }
  .container { max-width: 850px; margin: 0 auto; }
  
  .hero h1 { text-align: center; font-size: 2.2rem; font-weight: 800; color: #fff; margin-bottom: 25px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  
  .setup-row { display: flex; gap: 15px; justify-content: center; margin-bottom: 15px; }
  .setup-row input { background: #1a1a26; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; width: 60px; text-align: center; font-family: 'Space Mono'; }
  
  .matrix-grid { display: grid; gap: 8px; justify-content: center; margin: 15px 0; overflow-x: auto; }
  .matrix-row { display: flex; align-items: center; gap: 5px; }
  .aug-line { width: 2px; height: 25px; background: var(--accent); margin: 0 5px; }
  input.cell { background: #1a1a26; border: 1px solid var(--border); color: white; width: 65px; height: 40px; text-align: center; border-radius: 5px; font-family: 'Space Mono'; }

  .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; font-family: 'Syne'; transition: 0.2s; }
  .btn:hover { filter: brightness(1.2); }

  .step-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-top: 15px; }
  .step-op { padding: 10px; background: #161621; border-right: 3px solid var(--accent); direction: rtl; text-align: right; font-size: 0.85rem; margin: 10px; border-radius: 4px; }
  
  .mat-table { border-collapse: collapse; margin: 10px auto; font-family: 'Space Mono'; font-size: 0.8rem; }
  .mat-table td { padding: 6px 10px; border: 1px solid var(--border); text-align: center; min-width: 50px; }

  .analysis { border: 1px solid var(--accent3); padding: 15px; border-radius: 10px; background: rgba(67,233,123,0.02); direction: rtl; text-align: right; margin-top: 20px; }
  .eqn { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; margin: 5px 0; font-family: 'Space Mono'; direction: ltr; text-align: left; font-size: 0.9rem; }
</style>
</head>
<body>

<div class="container">
  <div class="hero"><h1>Gauss Solver Pro</h1></div>
  <div class="card">
    <div class="setup-row">
      <div>Rows: <input type="number" id="rows" value="3" onchange="init()"></div>
      <div>Cols: <input type="number" id="cols" value="3" onchange="init()"></div>
    </div>
    <div id="grid" class="matrix-grid"></div>
    <button class="btn" onclick="solve()">SOLVE SYSTEM</button>
  </div>
  <div id="output"></div>
</div>

<script>
// مثال جاهز للتجربة السريعة
const demo = [[1, 1, 1, 3], [1, 2, 3, 6], [2, 3, 4, 9]];

function init() {
  const r = +document.getElementById('rows').value || 3, c = +document.getElementById('cols').value || 3, g = document.getElementById('grid');
  g.innerHTML = '';
  for(let i=0; i<r; i++) {
    let row = document.createElement('div'); row.className = 'matrix-row';
    for(let j=0; j<c; j++) row.innerHTML += `<input type="number" class="cell" id="v_${i}_${j}" value="${(i<3&&j<3)?demo[i][j]:''}">`;
    row.innerHTML += `<div class="aug-line"></div>`;
    row.innerHTML += `<input type="number" class="cell" id="b_${i}" value="${(i<3)?demo[i][3]:''}" style="border-color:var(--accent)">`;
    g.appendChild(row);
  }
}

function solve() {
  const m = +document.getElementById('rows').value, n = +document.getElementById('cols').value;
  let mat = [];
  for(let i=0; i<m; i++) {
    let r = [];
    for(let j=0; j<n; j++) r.push(+document.getElementById(`v_${i}_${j}`).value || 0);
    r.push(+document.getElementById(`b_${i}`).value || 0);
    mat.push(r);
  }
  const out = document.getElementById('output'); out.innerHTML = '';
  let r = 0;
  for(let c=0; c<n && r<m; c++) {
    let pivot = r;
    while(pivot < m && Math.abs(mat[pivot][c]) < 1e-10) pivot++;
    if(pivot === m) continue;
    if(pivot !== r) { [mat[r], mat[pivot]] = [mat[pivot], mat[r]]; render(mat, n, `تبديل الصفوف: R${r+1} ↔ R${pivot+1}`, out); }
    for(let i=r+1; i<m; i++) {
      if(Math.abs(mat[i][c]) > 1e-10) {
        let v1 = mat[r][c], v2 = mat[i][c];
        for(let j=c; j<=n; j++) mat[i][j] = (v1 * mat[i][j]) - (v2 * mat[r][j]);
        render(mat, n, `تصفير x${c+1}: R${i+1} = (${v1})R${i+1} - (${v2})R${r+1}`, out);
      }
    }
    r++;
  }
  finalize(mat, m, n, out);
}

function render(mat, n, op, out) {
  let h = `<div class="step-card"><div class="step-op">${op}</div><table class="mat-table">`;
  mat.forEach(row => {
    h += '<tr>';
    row.forEach((v, idx) => h += `<td style="${idx===n?'border-left:1px solid var(--accent)':''}">${Number.isInteger(v)?v:v.toFixed(1)}</td>`);
    h += '</tr>';
  });
  out.innerHTML += h + '</table></div>';
}

function finalize(mat, m, n, out) {
  let rA = 0, rAB = 0, pivs = [];
  for(let i=0; i<m; i++) {
    let fA = false, fAB = false;
    for(let j=0; j<n; j++) if(Math.abs(mat[i][j])>1e-10) { if(!fA) pivs.push(j); fA=true; }
    for(let j=0; j<=n; j++) if(Math.abs(mat[i][j])>1e-10) fAB=true;
    if(fA) rA++; if(fAB) rAB++;
  }
  let res = `<div class="analysis"><h3>التحليل (Analysis)</h3><p>n=${n}, r=${rA}, rank(A|B)=${rAB}</p>`;
  if(rA < rAB) res += `<p style="color:var(--error)">No Solution (Rank A ≠ Rank A|B)</p>`;
  else if(rA === n) res += `<p>Solution is Unique (n=r):</p>` + back(mat, rA, n, pivs);
  else res += `<p style="color:var(--accent3)">Infinite Solutions (n > r):</p><p>Vars = ${n-rA}</p>` + inf(mat, rA, n, pivs);
  out.innerHTML += res + '</div>';
}

function back(mat, r, n, pivs) {
  let s = new Array(n).fill(0), h = "";
  for(let i=r-1; i>=0; i--) {
    let p = pivs[i], sum = mat[i][n];
    for(let j=p+1; j<n; j++) sum -= mat[i][j]*s[j];
    s[p] = sum/mat[i][p]; h += `<div class="eqn">x${p+1} = ${s[p].toFixed(2)}</div>`;
  }
  return h;
}

function inf(mat, r, n, pivs) {
  let free = []; for(let j=0; j<n; j++) if(!pivs.includes(j)) free.push(j);
  let sym = ['s','t','k'], m = {}, h = "<b>1. الفرض:</b>";
  free.forEach((c, idx) => { m[c] = sym[idx%3]; h += `<div class="eqn">x${c+1} = ${m[c]}</div>`; });
  h += "<br><b>2. المعادلات:</b>";
  for(let i=r-1; i>=0; i--) {
    let p = pivs[i], rhs = `${mat[i][n]}`;
    for(let j=p+1; j<n; j++) {
      if(Math.abs(mat[i][j])>1e-10) { let v=mat[i][j], t=m[j]||`x${j+1}`; rhs += (v>0)?` - (${v})${t}`:` + (${Math.abs(v)})${t}`; }
    }
    h += `<div class="eqn">x${p+1} = [ ${rhs} ] / ${mat[i][p]}</div>`;
  }
  return h;
}
init();
</script>
</body>
</html>
