<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gauss Elimination - Integer Method</title>

<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #2a2a40;
    --accent: #6c63ff; --accent3: #43e97b; --text: #e8e8f0; --muted: #6b6b8a;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; padding: 40px 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
  .matrix-grid { display: grid; gap: 10px; margin: 20px 0; overflow-x: auto; }
  .matrix-row { display: flex; align-items: center; gap: 8px; }
  .matrix-row input { background: #1a1a26; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; width: 70px; text-align: center; font-family: 'Space Mono'; }
  .btn { padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; width: 100%; transition: 0.3s; background: var(--accent); color: white; }
  
  /* Step Styling */
  .step-card { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; background: var(--surface); overflow: hidden; }
  .step-op { padding: 10px 20px; background: rgba(108,99,255,0.1); color: var(--accent); font-family: 'Space Mono'; font-size: 0.8rem; border-bottom: 1px solid var(--border); }
  .mat-table { border-collapse: collapse; margin: 20px auto; font-family: 'Space Mono'; }
  .mat-table td { padding: 8px 15px; border: 1px solid var(--border); text-align: center; }
  .aug-sep { border-left: 2px solid var(--accent) !important; }

  .analysis { border: 1px solid var(--accent3); padding: 20px; border-radius: 12px; background: rgba(67,233,123,0.05); }
</style>
</head>

    <div id="grid" class="matrix-grid"></div>
    <button class="btn" onclick="solve()">RUN CALCULATION</button>
  </div>
  <div id="output"></div>
</div>
