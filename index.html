<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gauss Solver — Integer Logic Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a40;
    --accent: #6c63ff; --accent2: #ff6584; --accent3: #43e97b;
    --text: #e8e8f0; --muted: #6b6b8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif;
    min-height: 100vh; padding: 40px 20px;
  }

  /* Grid Background */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px; z-index: 0; pointer-events: none;
  }

  .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; }

  .hero { text-align: center; margin-bottom: 40px; }
  .hero-tag {
    display: inline-block; font-family: 'Space Mono'; font-size: 11px;
    letter-spacing: 3px; color: var(--accent); border: 1px solid rgba(108,99,255,0.4);
    padding: 5px 14px; border-radius: 20px; margin-bottom: 20px; text-transform: uppercase;
  }
  .hero h1 { font-size: 2.8rem; font-weight: 800; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 30px; margin-bottom: 25px;
  }

  .matrix-grid { display: grid; gap: 10px; margin: 20px 0; overflow-x: auto; }
  .matrix-row { display: flex; align-items: center; gap: 8px; min-width: max-content; }
  
  input.cell {
    background: var(--surface2); border: 1px solid var(--border); color: white;
    padding: 12px; border-radius: 10px; width: 75px; text-align: center;
    font-family: 'Space Mono'; outline: none; transition: 0.3s;
  }
  input.cell:focus { border-color: var(--accent); background: rgba(108,99,255,0.1); }
  .b-cell { background: rgba(108,99,255,0.08) !important; border-color: rgba(108,99,255,0.3) !important; }

  .btn {
    padding: 15px 30px; border-radius: 12px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #8a84ff); color: white;
    font-weight: 700; width: 100%; font-family: 'Syne'; transition: 0.3s;
  }

  .step-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .step-header { padding: 12px 20px; font-family: 'Space Mono'; font-size: 0.75rem; background: rgba(108,99,255,0.08); color: var(--accent); border-bottom: 1px solid var(--border); }
  .step-op { font-family: 'Space Mono'; font-size: 0.85rem; padding: 10px 15px; background: var(--surface2); border-radius: 8px; border-left: 3px solid var(--accent3); margin: 15px; }

  .mat-table { border-collapse: collapse; margin: 20px auto; font-family: 'Space Mono'; font-size: 0.9rem; }
  .mat-table td { padding: 10px 18px; border: 1px solid var(--border); text-align: center; min-width: 65px; }
  .aug-line { border-left: 2px solid var(--accent) !important; }

  .analysis { border: 1px solid var(--accent3); padding: 25px; border-radius: 16px; background: rgba(67,233,123,0.03); margin-top: 30px; }
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <div class="hero-tag">Optimized Academic Logic</div>
    <h1>Gauss Real-Logic</h1>
  </div>

  <div class="card">
    <div style="display:flex; gap:15px; margin-bottom:25px;">
      <div style="flex:1">
        <label style="font-size:0.7rem; color:var(--muted); display:block; margin-bottom:8px;">ROWS (m)</label>
        <input type="number" id="rows" value="3" class="cell" style="width:100%" onchange="initGrid()">
      </div>
      <div style="flex:1">
        <label style="font-size:0.7rem; color:var(--muted); display:block; margin-bottom:8px;">COLS (n)</label>
        <input type="number" id="cols" value="3" class="cell" style="width:100%" onchange="initGrid()">
      </div>
    </div>
    <div id="grid" class="matrix-grid"></div>
    <button class="btn" style="margin-top:25px" onclick="solve()">START CALCULATION</button>
  </div>

  <div id="output"></div>
</div>

<script>
function initGrid() {
    const r = +document.getElementById('rows').value || 3;
    const c = +document.getElementById('cols').value || 3;
    const g = document.getElementById('grid');
    g.innerHTML = '';
    for(let i=0; i<r; i++) {
        let rowDiv = document.createElement('div');
        rowDiv.className = 'matrix-row';
        for(let j=0; j<c; j++) {
            rowDiv.innerHTML += `<input type="number" class="cell" id="v_${i}_${j}" placeholder="0">`;
        }
        rowDiv.innerHTML += `<span style="color:var(--border); font-size:1.5rem; margin:0 5px;">|</span>`;
        rowDiv.innerHTML += `<input type="number" class="cell b-cell" id="b_${i}" placeholder="b">`;
        g.appendChild(rowDiv);
    }
}

function solve() {
    const m = +document.getElementById('rows').value;
    const n = +document.getElementById('cols').value;
    let mat = [];
    for(let i=0; i<m; i++) {
        let row = [];
        for(let j=0; j<n; j++) row.push(Number(document.getElementById(`v_${i}_${j}`).value) || 0);
        row.push(Number(document.getElementById(`b_${i}`).value) || 0);
        mat.push(row);
    }

    const out = document.getElementById('output');
    out.innerHTML = '';

    let r = 0;
    for(let c=0; c<n && r<m; c++) {
        // 1. Logic Swap: Only if the current pivot is truly 0
        if(Math.abs(mat[r][c]) < 1e-10) {
            let swp = -1;
            for(let i=r+1; i<m; i++) if(Math.abs(mat[i][c]) > 1e-10) { swp = i; break; }
            if(swp !== -1) {
                [mat[r], mat[swp]] = [mat[swp], mat[r]];
                addStep(mat, n, `R${r+1} ↔ R${swp+1} (Swap needed: Pivot was zero)`, out);
            } else continue;
        }

        // 2. Elimination using Integer Scaling (R_i = (val1)R_i - (val2)R_pivot)
        for(let i=r+1; i<m; i++) {
            if(Math.abs(mat[i][c]) > 1e-10) {
                let pVal = mat[r][c]; // Pivot value
                let tVal = mat[i][c]; // Target value
                let op = `R${i+1} = (${pVal})R${i+1} - (${tVal})R${r+1}`;
                
                for(let j=c; j<=n; j++) {
                    mat[i][j] = (pVal * mat[i][j]) - (tVal * mat[r][j]);
                }
                addStep(mat, n, op, out);
            }
        }
        r++;
    }
    finalize(mat, m, n, out);
}

function addStep(mat, n, op, container) {
    let html = `<div class="step-card"><div class="step-header">STEP EXECUTION</div><div class="step-op">${op}</div><table class="mat-table">`;
    mat.forEach(r => {
        html += `<tr>`;
        r.forEach((v, idx) => html += `<td class="${idx===n?'aug-line':''}">${Number.isInteger(v) ? v : v.toFixed(2)}</td>`);
        html += `</tr>`;
    });
    container.innerHTML += html + `</table></div>`;
}

function finalize(mat, m, n, out) {
    let rankA = 0, rankAB = 0;
    for(let i=0; i<m; i++) {
        let isZeroA = true, isZeroAB = true;
        for(let j=0; j<n; j++) if(Math.abs(mat[i][j]) > 1e-10) isZeroA = false;
        for(let j=0; j<=n; j++) if(Math.abs(mat[i][j]) > 1e-10) isZeroAB = false;
        if(!isZeroA) rankA++; if(!isZeroAB) rankAB++;
    }

    let status = (rankA < rankAB) ? "Inconsistent (No Solution)" : (rankA === n ? "Unique Solution" : "Infinite Solutions");
    let html = `<div class="analysis"><h3>Final Analysis</h3><p>Rank(A) = ${rankA} | Rank(A|B) = ${rankAB}</p><p style="color:var(--accent3); font-weight:700;">${status}</p></div>`;
    out.innerHTML += html;
}

initGrid();
</script>
</body>
</html>
