<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gauss Elimination Solver - Advanced AI Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a40;
    --accent: #6c63ff; --accent2: #ff6584; --accent3: #43e97b; --text: #e8e8f0;
    --muted: #6b6b8a; --pivot-color: #ffd166;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; padding-bottom: 50px; }
  .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
  .matrix-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; overflow-x: auto; padding: 5px; }
  .matrix-input-row input { background: var(--surface2); border: 1px solid var(--border); color: white; width: 70px; padding: 10px; border-radius: 8px; text-align: center; font-family: 'Space Mono'; }
  .btn { padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-family: 'Syne'; transition: 0.3s; }
  .btn-primary { background: var(--accent); color: white; width: 100%; margin-top: 15px; }
  
  /* Step Styling */
  .step-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 25px; }
  .step-header { background: rgba(108,99,255,0.1); padding: 15px 20px; font-family: 'Space Mono'; font-size: 0.85rem; border-bottom: 1px solid var(--border); color: var(--accent); }
  .mat-table { border-collapse: collapse; margin: 20px; font-family: 'Space Mono'; font-size: 0.85rem; }
  .mat-table td { border: 1px solid var(--border); padding: 10px 15px; text-align: center; min-width: 65px; }
  .aug-sep { border-left: 2px solid var(--accent) !important; color: var(--accent3); }
  
  .analysis-card { background: var(--surface2); border: 1px solid var(--accent); padding: 20px; border-radius: 12px; margin-top: 20px; }
  .rank-tag { display: inline-block; padding: 5px 12px; border-radius: 6px; font-family: 'Space Mono'; font-size: 0.8rem; margin-right: 10px; }
  .badge-rank-a { background: rgba(108,99,255,0.2); color: var(--accent); }
  .badge-rank-ab { background: rgba(67,233,123,0.2); color: var(--accent3); }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 style="margin-bottom:20px;">Linear System Solver</h2>
    <div style="display:flex; gap:15px; margin-bottom:20px;">
      <div style="flex:1"><label style="font-size:0.7rem; color:var(--muted)">Equations (m)</label><input type="number" id="rows" value="3" style="width:100%; padding:8px; border-radius:5px; background:#1a1a26; border:1px solid #2a2a40; color:white;"></div>
      <div style="flex:1"><label style="font-size:0.7rem; color:var(--muted)">Variables (n)</label><input type="number" id="cols" value="3" style="width:100%; padding:8px; border-radius:5px; background:#1a1a26; border:1px solid #2a2a40; color:white;"></div>
      <button class="btn" style="background:var(--border); color:white; align-self:flex-end;" onclick="initMatrix()">Generate</button>
    </div>
    <div id="inputGrid"></div>
    <button class="btn btn-primary" onclick="runGauss()">SOLVE STEP-BY-STEP</button>
  </div>
  <div id="stepsArea"></div>
</div>

<script>
const EPS = 1e-10;

function initMatrix() {
    const m = +document.getElementById('rows').value;
    const n = +document.getElementById('cols').value;
    const grid = document.getElementById('inputGrid');
    grid.innerHTML = '';
    for(let i=0; i<m; i++) {
        let rowDiv = document.createElement('div');
        rowDiv.className = 'matrix-input-row';
        rowDiv.innerHTML = `<span style="width:30px; font-size:0.7rem; color:var(--muted)">R${i+1}</span>`;
        for(let j=0; j<n; j++) rowDiv.innerHTML += `<input type="number" id="v_${i}_${j}" placeholder="x${j+1}">`;
        rowDiv.innerHTML += `<span style="color:var(--accent); font-weight:bold;">|</span>`;
        rowDiv.innerHTML += `<input type="number" id="b_${i}" style="border-color:var(--accent)" placeholder="b">`;
        grid.appendChild(rowDiv);
    }
}

function runGauss() {
    const m = +document.getElementById('rows').value;
    const n = +document.getElementById('cols').value;
    let matrix = [];
    for(let i=0; i<m; i++) {
        let row = [];
        for(let j=0; j<n; j++) row.push(Number(document.getElementById(`v_${i}_${j}`).value) || 0);
        row.push(Number(document.getElementById(`b_${i}`).value) || 0);
        matrix.push(row);
    }

    const stepsArea = document.getElementById('stepsArea');
    stepsArea.innerHTML = '<h3>Solution Progress</h3>';

    let r = 0; // pivot row
    for(let c=0; c<n && r<m; c++) {
        let pivot = r;
        for(let i=r+1; i<m; i++) if(Math.abs(matrix[i][c]) > Math.abs(matrix[pivot][c])) pivot = i;
        
        if(Math.abs(matrix[pivot][c]) < EPS) continue;

        if(pivot !== r) {
            [matrix[r], matrix[pivot]] = [matrix[pivot], matrix[r]];
            displayStep(matrix, n, `Swap Row ${r+1} with Row ${pivot+1}`, stepsArea);
        }

        for(let i=0; i<m; i++) {
            if(i !== r && Math.abs(matrix[i][c]) > EPS) {
                let factor = matrix[i][c] / matrix[r][c];
                for(let j=c; j<=n; j++) matrix[i][j] -= factor * matrix[r][j];
                displayStep(matrix, n, `R${i+1} = R${i+1} - (${factor.toFixed(2)}) * R${r+1}`, stepsArea);
            }
        }
        r++;
    }
    
    analyze(matrix, m, n, stepsArea);
}

function displayStep(mat, n, desc, container) {
    let html = `<div class="step-box"><div class="step-header">${desc}</div><table class="mat-table">`;
    mat.forEach(row => {
        html += `<tr>`;
        row.forEach((v, idx) => {
            let cls = (idx === n) ? 'class="aug-sep"' : '';
            html += `<td ${cls}>${Number(v.toFixed(3))}</td>`;
        });
        html += `</tr>`;
    });
    html += `</table></div>`;
    container.innerHTML += html;
}

function analyze(mat, m, n, container) {
    let rankA = 0;
    let rankAB = 0;

    for(let i=0; i<m; i++) {
        let rowAHasVal = false;
        let rowABHasVal = false;
        for(let j=0; j<n; j++) if(Math.abs(mat[i][j]) > EPS) rowAHasVal = true;
        for(let j=0; j<=n; j++) if(Math.abs(mat[i][j]) > EPS) rowABHasVal = true;
        if(rowAHasVal) rankA++;
        if(rowABHasVal) rankAB++;
    }

    let status = "";
    if(rankA < rankAB) status = "Inconsistent (No Solution)";
    else if(rankA === n) status = "Consistent (Unique Solution)";
    else status = "Consistent (Infinite Solutions)";

    let html = `
    <div class="analysis-card">
        <h4 style="margin-bottom:15px">Final System Analysis:</h4>
        <p><span class="rank-tag badge-rank-a">Rank(A) = ${rankA}</span>
        <span class="rank-tag badge-rank-ab">Rank(A|B) = ${rankAB}</span></p>
        <p style="margin-top:10px; color:var(--accent3)">System Status: <strong>${status}</strong></p>
        <div style="margin-top:15px; font
